# cargo-deny configuration for security and license checks
# Compatible with cargo-deny 0.19.0+

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

yanked = "deny"
unmaintained = "all"

ignore = [
    "RUSTSEC-2021-0154", # fuser - optional dependency, not used yet
]

[licenses]
# Minimum confidence for license detection (0.0–1.0)
confidence-threshold = 0.8

# Allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "Unicode-3.0",
]

# Explicitly reject these licenses
# (Anything not in `allow` is denied by default)
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"